name: Release NAPI

permissions: {}

on:
  workflow_dispatch:
    inputs:
      npm_tag:
        description: 'npm publish tag'
        required: true
        default: 'latest'
        type: choice
        options:
          - latest
          - alpha
      version:
        description: 'Override version (leave empty to use workspace.package.version)'
        required: false
        default: ''
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NPM_TAG: ${{ inputs.npm_tag }}
  DEBUG: 'napi:*'

# ── Build native .node binaries ──────────────────────────────────────────────
#
# Build matrix strategy (matching napi.targets in package.json):
#   - Linux GNU targets:  ubuntu-latest + --use-napi-cross   (arm64 via napi cross-toolchain)
#   - Linux musl targets: ubuntu-latest + zig / cargo-zigbuild  (-x flag)
#   - macOS targets:      native macOS runners
#   - Windows targets:    native Windows runners
#
jobs:
  build-rust:
    name: Build ${{ matrix.settings.target }}
    runs-on: ${{ matrix.settings.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        settings:
          # ── macOS ─────────────────────────────────────────────────────────
          - target: aarch64-apple-darwin
            os: macos-latest
            build: pnpm --filter @vue-oxlint/plugin build-native --target aarch64-apple-darwin

          - target: x86_64-apple-darwin
            os: macos-latest
            build: pnpm --filter @vue-oxlint/plugin build-native --target x86_64-apple-darwin

          # ── Linux GNU (napi-cross for cross-compilation) ───────────────────
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            build: pnpm --filter @vue-oxlint/plugin build-native --target aarch64-unknown-linux-gnu --use-napi-cross
            env:
              TARGET_CC: clang
              TARGET_CFLAGS: -D_BSD_SOURCE

          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            build: pnpm --filter @vue-oxlint/plugin build-native --target x86_64-unknown-linux-gnu --use-napi-cross
            env:
              TARGET_CC: clang

          # ── Linux musl (zig cross-compilation) ────────────────────────────
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            build: pnpm --filter @vue-oxlint/plugin build-native --target aarch64-unknown-linux-musl -x
            env:
              TARGET_CC: clang
              TARGET_CFLAGS: -D_BSD_SOURCE

          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            build: pnpm --filter @vue-oxlint/plugin build-native --target x86_64-unknown-linux-musl -x
            env:
              TARGET_CC: clang

          # ── Windows ───────────────────────────────────────────────────────
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            build: pnpm --filter @vue-oxlint/plugin build-native --target x86_64-pc-windows-msvc

          - target: aarch64-pc-windows-msvc
            os: windows-11-arm
            build: pnpm --filter @vue-oxlint/plugin build-native --target aarch64-pc-windows-msvc

    steps:
      - uses: taiki-e/checkout-action@v1

      - uses: oxc-project/setup-rust@v1
        with:
          targets: ${{ matrix.settings.target }}
          save-cache: false

      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      # musl: install zig + cargo-zigbuild for cross-compilation
      - name: Setup zig (musl only)
        if: ${{ contains(matrix.settings.target, 'musl') }}
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Install cargo-zigbuild (musl only)
        if: ${{ contains(matrix.settings.target, 'musl') }}
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-zigbuild

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: napi-${{ matrix.settings.target }}
          save-if: false

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Set package version
        if: ${{ inputs.version != '' }}
        shell: bash
        run: |
          sed -i 's/"version": "0.0.0"/"version": "${{ inputs.version }}"/' packages/vue-oxlint-plugin/package.json

      - name: Build native module
        shell: bash
        run: ${{ matrix.settings.build }}
        env: ${{ matrix.settings.env || fromJSON('{}') }}

      - name: Upload .node artifact
        uses: actions/upload-artifact@v4
        with:
          name: napi-${{ matrix.settings.target }}
          path: packages/vue-oxlint-plugin/*.node
          if-no-files-found: error

# ── Publish ──────────────────────────────────────────────────────────────────

  publish:
    name: Publish to npm
    needs: build-rust
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: taiki-e/checkout-action@v1

      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'
          cache: pnpm

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Set package version
        shell: bash
        run: |
          VERSION="${{ inputs.version }}"
          if [ -z "$VERSION" ]; then
            # Fall back to workspace version from Cargo.toml
            VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          fi
          echo "Publishing version: $VERSION"
          sed -i "s/\"version\": \"0.0.0\"/\"version\": \"$VERSION\"/" packages/vue-oxlint-plugin/package.json

      - name: Download all platform .node artifacts
        uses: actions/download-artifact@v4
        with:
          path: packages/vue-oxlint-plugin/artifacts
          pattern: napi-*
          merge-multiple: false

      - name: Publish platform packages + main package
        working-directory: packages/vue-oxlint-plugin
        run: pnpm run publish-native
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish main @vue-oxlint/plugin
        working-directory: packages/vue-oxlint-plugin
        run: pnpm publish --tag ${{ inputs.npm_tag }} --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          make_latest: ${{ inputs.npm_tag == 'latest' }}
          prerelease: ${{ inputs.npm_tag == 'alpha' }}
          tag_name: v${{ inputs.version || '0.0.0' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
